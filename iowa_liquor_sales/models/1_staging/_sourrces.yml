version: 2

sources:
  - name: bigquery_public_data
    database: bigquery-public-data
    schema: iowa_liquor_sales
    description: "Public dataset containing wholesale liquor purchase records in Iowa."
    tables:
      - name: sales
        description: "Main transaction table for Iowa liquor sales since 2012."
        columns:
          - name: invoice_and_item_number
            description: "Concatenated invoice and item number forming the unique key."
            tests:
              - unique
              - not_null
          - name: date
            description: "Date of order."
          - name: store_number
            description: "Unique number assigned to the store."
            tests:
              - not_null
          - name: store_name
            data_type: string
            description: "Name of store who ordered the liquor."
          - name: address
            data_type: string
            description: "Address of store who ordered the liquor."
          - name: city
            data_type: string
            description: "City where the store who ordered the liquor is located."
          - name: zip_code
            data_type: string
            description: "Zip code where the store who ordered the liquor is located."
          - name: store_location
            data_type: geography
            description: "Location of store who ordered the liquor geocoded to provide geographic coordinates."
          - name: county_number
            data_type: string
            description: "Iowa county number for the county where store who ordered the liquor is located."
          - name: county
            data_type: string
            description: "County where the store who ordered the liquor is located."
          - name: category
            data_type: string
            description: "Category code associated with the liquor ordered."
          - name: category_name
            description: "The category of liquor (e.g., Vodkas, Whiskies)."
          - name: vendor_number
            data_type: string
            description: "The vendor number of the company for the brand of liquor ordered."
          - name: vendor_name
            description: "The vendor/company supplying the liquor."
          - name: item_number
            description: "The item number for the specific liquor."
          - name: item_description
            data_type: string
            description: "Description of the specific liquor."
          - name: pack
            data_type: int64
            description: "The number of bottles in a case."
          - name: bottle_volume_ml
            data_type: int64
            description: "Volume of each liquor bottle in milliliters."
          - name: state_bottle_cost
            data_type: float64
            description: "The amount that Alcoholic Beverages Division paid for each bottle."
          - name: state_bottle_retail
            data_type: float64
            description: "The amount the store paid for each bottle of liquor ordered."
          - name: bottles_sold
            description: "The number of bottles of liquor ordered by the store."
          - name: sale_dollars
            description: "Total cost of liquor ordered ((number of bottles sold multiplied by the state bottle retail)."
          - name: volume_sold_liters
            data_type: float64
            description: "Total volume of liquor ordered in liters. (i.e. (Bottle Volume (ml) x Bottles Sold)/1,000)."
          - name: volume_sold_gallons
            data_type: float64
            description: "Total volume of liquor ordered in gallons. (i.e. (Bottle Volume (ml) x Bottles Sold)/3785.411784)"