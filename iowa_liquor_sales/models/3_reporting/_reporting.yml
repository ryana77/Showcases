version: 2

models:
  - name: rpt_liquor_sales_dashboard
    description: >
      Reporting model optimized for Google Data Studio.
      This model denormalizes the star schema by joining the liquor sales fact table
      with the date, store, and product dimensions to provide a single,
      analytics-ready dataset for interactive dashboards.

    columns:
      # Sales
      - name: sales_id
        description: Unique identifier for the liquor sales transaction.
        data_tests:
          - unique
          - not_null
      - name: order_date
        description: Transaction date.

      # Date
      - name: year
        description: "Four-digit calendar year."
        data_type: int64
      - name: quarter
        description: "Calendar quarter (1-4)."
        data_type: int64
      - name: month
        description: "Calendar month number (1-12)."
        data_type: int64
      - name: month_name
        description: "Full calendar month name (e.g. January)."
        data_type: string
      - name: month_short
        description: "Abbreviated calendar month name (e.g. Jan)."
        data_type: string
      - name: week
        description: "ISO week number of the year."
        data_type: int64
      - name: day
        description: "Day of the month (1-31)."
        data_type: int64
      - name: day_name
        description: "Full weekday name (e.g. Monday)."
        data_type: string
      - name: is_weekend
        description: "Indicates whether the date falls on a weekend."
        data_type: boolean
      - name: year_month
        description: "Year and month formatted as YYYY-MM."
        data_type: string
      - name: year_quarter
        description: "Year and quarter formatted as YYYY-QN"
        data_type: string

      # Store
      - name: store_id
        data_type: string
        description: "The unique primary key identifying an individual retail store location."
        tests:
          - not_null
      - name: store_name
        data_type: string
        description: "Name of the purchasing store."
      - name: store_county
        data_type: string
        description: "The Iowa county where the purchasing store is located."
      - name: store_city
        data_type: string
        description: "The Iowa city where the purchasing store is located."
      - name: store_location_geocoded
        data_type: geography
        description: "Location of the purchasing store geocoded to provide geographic coordinates."
      - name: store_status
        data_type: string
        description: "Operational visibility state tagging stores as 'Active' or 'Churned/Inactive' based on a rolling 180-day activity window."

      # Product
      - name: product_id
        data_type: string
        description: "The unique primary key identifying an individual product."
        data_tests:
          - not_null
      - name: product_description
        data_type: string
        description: "Description of the specific liquor."
      - name: product_category
        data_type: string
        description: "The broad commercial classification of the liquor (e.g., VODKA, WHISKEY)."
      - name: bottles_per_case
        data_type: int64
        description: "The number of bottles contained within a single wholesale shipping case."
      - name: bottle_volume_ml
        data_type: int64
        description: "The volume capacity of an individual liquor bottle measured in milliliters."

      # Measures
      - name: wholesale_bottles_sold
        data_type: int64
        description: Number of bottles sold in the wholesale transaction.
      - name: volume_sold_liters
        data_type: float64
        description: Total volume sold in liters.
      - name: wholesale_bottle_cost
        data_type: float64
        description: Wholesale cost per bottle.
      - name: wholesale_bottle_retail
        data_type: float64
        description: Suggested retail price per bottle.
      - name: wholesale_revenue_dollars
        data_type: float64
        description: Total wholesale revenue generated by the transaction.
      - name: wholesale_profit_dollars
        data_type: float64
        description: Estimated wholesale profit generated by the transaction.
      - name: estimated_retail_revenue_dollars
        data_type: float64
        description: Estimated retail revenue based on the suggested retail price.

  - name: rpt_pipeline_health
    description: "A metadata and pipeline audit fact table aggregating data quality exceptions, processing volumes, and source table data freshness metrics."
    columns:
      - name: min_data_date
        data_type: date
        description: "The first record date included in the staging model."
      - name: max_data_date
        data_type: date
        description: "The newest record date found in the source dataset. Measures upstream data pipeline latency."
      - name: execution_date
        data_type: date
        description: "The execution timestamp when this specific dbt model run completed."
      - name: days_since_last_update
        data_type: int64
        description: "The age of the data payload expressed as the gap in days between current system execution time and max_data_date."
      - name: total_rows_processed
        data_type: int64
        description: "The universal scale metric indicating total volumetric record throughput handled by the run."
      - name: count_zero_or_negative_sales
        data_type: int64
        description: "A data quality error indicator identifying anomalous transaction rows with zero or negative cost values."
      - name: count_missing_categories
        data_type: int64
        description: "A data quality error indicator tracking records where commercial inventory categorization attributes were empty or null."
      - name: count_missing_stores
        data_type: int64
        description: "A data quality error indicator checking for structural relational database breakages where a sale lacks a valid store_id."