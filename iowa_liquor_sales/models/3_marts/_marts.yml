version: 2

models:
  - name: fct_liquor_sales
    description: "Partitioned and clustered core fact table containing individual line-item B2B wholesale liquor transactions between the State of Iowa and local retail stores."
    columns:
      - name: sales_id
        data_type: string
        description: "The primary key for this table. Generated from the invoice and item line number identifier."
        tests:
          - unique
          - not_null
      - name: order_date
        data_type: date
        description: "The order date. Used as the database table partition key."
        tests:
          - not_null
      - name: store_id
        data_type: string
        description: "Foreign key linking to the dim_stores dimension table."
        tests:
          - not_null
      - name: product_id
        data_type: string
        description: "The category code associated with the liquor ordered.."
      - name: product_category
        data_type: string
        description: "The broad commercial classification of the liquor (e.g., VODKA, WHISKEY)."
      - name: vendor_name
        data_type: string
        description: "The vendor/company supplying the liquor."
      - name: store_county
        data_type: string
        description: "The Iowa county where the purchasing store is located."
      - name: store_city
        data_type: string
        description: "The Iowa city where the purchasing store is located."
      - name: bottles_per_case
        data_type: int64
        description: "The number of bottles contained within a single wholesale shipping case."
      - name: bottle_volume_ml
        data_type: int64
        description: "The volume capacity of an individual liquor bottle measured in milliliters."
      - name: wholesale_bottles_sold
        data_type: int64
        description: "The quantity of individual bottles ordered by the store."
      - name: volume_sold_liters
        data_type: float64
        description: "The total volume of liquor sold in this transaction, converted to liters."
      - name: wholesale_bottle_cost
        data_type: float64
        description: "The base price the State of Iowa paid to the vendor/distributor for a single bottle."
      - name: wholesale_bottle_retail
        data_type: float64
        description: "The wholesale price the retail store paid to the State of Iowa for a single bottle."
      - name: wholesale_revenue_dollars
        data_type: float64
        description: "Total wholesale revenue generated by the State of Iowa for this line item. Calculated as wholesale_bottles_sold multiplied by wholesale_unit_price."
      - name: wholesale_profit_dollars
        data_type: float64
        description: "he exact dollar margin captured by the state government. Calculated as (wholesale_unit_price minus wholesale_unit_cost) multiplied by wholesale_bottles_sold."
      - name: estimated_retail_revenue_dollars
        data_type: float64
        description: "A calculated metric modeling potential consumer-facing sales, applying an estimated baseline 20% retail store markup over wholesale cost."

  - name: dim_stores
    description: "A dimension table compiling holistic performance, lifetime value, physical geography, and operational tier rankings for individual retail stores."
    columns:
      - name: store_id
        data_type: string
        description: "The unique primary key identifying an individual retail store location."
        tests:
          - unique
          - not_null
      - name: store_name
        data_type: string
        description: "Name of the purchasing store."
      - name: store_county
        data_type: string
        description: "The Iowa county where the purchasing store is located."
      - name: store_city
        data_type: string
        description: "The Iowa city where the purchasing store is located."
      - name: store_location_geocoded
        data_type: geography
        description: "Location of the purchasing store geocoded to provide geographic coordinates."
      - name: total_orders
        data_type: int64
        description: "The cumulative distinct count of B2B invoices processed by the store across historical data."
      - name: total_wholesale_revenue
        data_type: float64
        description: "The cumulative dollar spend of inventory purchased by the store from the state distribution network."
      - name: last_order_date
        data_type: date
        description: "The maximum date timestamp of the most recent order submitted by the store."
      - name: store_tier
        data_type: string
        description: "An algorithmic commercial category classification categorizing accounts based on cumulative spending velocity (Gold, Silver, Bronze)."
      - name: store_status
        data_type: string
        description: "Operational visibility state tagging stores as 'Active' or 'Churned/Inactive' based on a rolling 180-day activity window."

  - name: fct_pipeline_health
    description: "A metadata and pipeline audit fact table aggregating data quality exceptions, processing volumes, and source table data freshness metrics."
    columns:
      - name: max_data_date
        data_type: date
        description: "The newest record date found in the source dataset. Measures upstream data pipeline latency."
      - name: execution_date
        data_type: date
        description: "The execution timestamp when this specific dbt model run completed."
      - name: days_since_last_update
        data_type: int64
        description: "The age of the data payload expressed as the gap in days between current system execution time and max_data_date."
      - name: total_rows_processed
        data_type: int64
        description: "The universal scale metric indicating total volumetric record throughput handled by the run."
      - name: count_zero_or_negative_sales
        data_type: int64
        description: "A data quality error indicator identifying anomalous transaction rows with zero or negative cost values."
      - name: count_missing_categories
        data_type: int64
        description: "A data quality error indicator tracking records where commercial inventory categorization attributes were empty or null."
      - name: count_missing_stores
        data_type: int64
        description: "A data quality error indicator checking for structural relational database breakages where a sale lacks a valid store_id."