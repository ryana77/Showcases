version: 2

models:
  - name: fact_sales
    description: "Central transaction table tracking liquor revenue and volumes sold."
    columns:
      - name: sales_id
        description: "Primary key. Unique identifier for each transaction line item."
        tests:
          - unique
          - not_null
      - name: store_id
        description: "Foreign key linking to dim_stores."
      - name: revenue_usd
        description: "Gross revenue generated by the line item sale."

  - name: dim_stores
    description: "Dimension table containing unique attributes for Iowa liquor retail outlets."
    columns:
      - name: store_id
        description: "Primary key for stores."
        tests:
          - unique
          - not_null